function wrapText(text) {
    if (Array.isArray(text)) return text;
    const words = text.split(' ');
    const lines = [];
    let currentLine = "";
    ctx.font = '20px Georgia';
    for (let i = 0; i < words.length; i++) {
        let testLine = currentLine + words[i] + " ";
        if (ctx.measureText(testLine).width > 850) {
            lines.push(currentLine);
            currentLine = words[i] + " ";
        } else {
            currentLine = testLine;
        }
    }
    lines.push(currentLine);
    return lines;
}

function startHeraclitusGame() {
    // 1. Resetta gli stati di gioco interni
    heraclitusGame.active = true;
    heraclitusGame.gameOver = false;
    heraclitusGame.won = false;
    heraclitusGame.completed = false; // Deve essere false finché non vince adesso!
    heraclitusGame.finalZone = false;
    heraclitusGame.freeRoam = false;
    heraclitusGame.postWin = false;
    heraclitusGame.evaluated = false;
    
    // 2. Resetta i flag dei messaggi (altrimenti il gioco crede di aver già mostrato tutto)
    heraclitusGame.logostextShown = false; 
    heraclitusGame.logoMessageTimer = 0;

    // 3. Resetta i parametri della partita
    heraclitusGame.timer = heraclitusGame.maxTimer;
    heraclitusGame.progress = 0;
    heraclitusGame.progressPos = 0;
    heraclitusGame.lives = 2;
    heraclitusGame.lanes = 2;
    heraclitusGame.currentLane = 0;

    // Chiude eventuali dialoghi aperti per non bloccare l'interfaccia
    dialogue = null; 
    gameState = "heraclitus"; // Imposta il gamestate corretto per il minigioco

    // Qui inserisci la tua logica per generare il primo round (es. nextHeraclitusRound();)
    nextHeraclitusRound(); 
}

function resetHeraclitusGame() {
    heraclitusGame.active = false;
    heraclitusGame.gameOver = false;
    heraclitusGame.lanes = 2;
    heraclitusGame.currentLane = 0;
    heraclitusGame.progress = 0;
    heraclitusGame.progressPos = 0;
    heraclitusGame.mistakes = 0;
    heraclitusGame.lives = 2;
    heraclitusGame.timer = heraclitusGame.maxTimer;
    heraclitusGame.flash = null;
    heraclitusGame.flashTimer = 0;
    heraclitusGame.scrollY = 0;
}

function nextHeraclitusRound() {
    let data = oppositeWords[Math.floor(Math.random() * oppositeWords.length)];
    heraclitusGame.guideWord = data.guide;
    let choices = [data.correct];
    let wrongs = [...data.wrong];
    while (choices.length < heraclitusGame.lanes) {
        let rand = wrongs.splice(Math.floor(Math.random() * wrongs.length), 1)[0];
        choices.push(rand);
    }
    heraclitusGame.evaluated = false;
    choices.sort(() => Math.random() - 0.5);
    heraclitusGame.options = choices;
    heraclitusGame.correctLane = choices.indexOf(data.correct);
    heraclitusGame.timer = heraclitusGame.maxTimer;
     
    heraclitusGame.answerMap = {
        "MALATTIA": "SALUTE",
        "FAME": "SAZIETÀ",
        "GUERRA": "PACE",
        "UNO": "MOLTI",
        "ARCO": "LIRA"
    };
}

function checkQuiz(choice) {
    const q = quizData[targetStatue.id_name];
    if (choice === q.correct) {
        puzzle.solvedQuizzes.push(targetStatue.id_name);
        dialogue = ["Risposta esatta. Hai compreso l'Archè."];
        if(puzzle.solvedQuizzes.length === 3) { puzzle.keyAppeared = true; }
    } else {
        dialogue = ["Risposta errata. L'ignoranza ti avvolge. Riprova."];
    }
    quizPhase = false;
}

function createRoom(){
    const m=[]; for(let y=0;y<H;y++){ const row=[]; for(let x=0;x<W;x++)row.push(0); m.push(row); }
    for(let x=0;x<W;x++){ m[0][x]=1; m[H-1][x]=1; }
    for(let y=0;y<H;y++){ m[y][0]=1; m[y][W-1]=1; }
    for(let y=3;y<17;y++){ for(let x=22;x<34;x++)m[y][x]=0; }
    for(let x=0;x<24;x++){ m[PY][x]=3; m[PY+1][x]=3; }
    return m;
}
const maps=[createRoom(),createRoom(), createRoom()];

function drawPath(x, y, w, h) {
    const colors = ['#8d775f', '#7a6752', '#9b866d', '#6d5a46'];
    for(let i=0; i<w; i+=8) {
        for(let j=0; j<h; j+=8) {
            ctx.fillStyle = colors[(Math.floor(x+i/8) + Math.floor(y+j/8)) % colors.length];
            ctx.fillRect(x+i, y+j, 8, 8);
        }
    }
}

function isTemple(x,y){
    const gx=Math.floor(x/TS); const gy=Math.floor(y/TS);
    return gx>=22 && gx<34 && gy>=10 && gy<=11;
}
function checkTile(x,y){
    const gx=Math.floor(x/TS); const gy=Math.floor(y/TS);
    if(!maps[room][gy]) return false;
    return maps[room][gy][gx]===3 || isTemple(x,y);
}
function isWalkableRect(x,y,w,h){
    return (checkTile(x,y) && checkTile(x+w,y) && checkTile(x,y+h) && checkTile(x+w,y+h));
}
function coll(x,y){
    const gx=Math.floor(x/TS); const gy=Math.floor(y/TS);
    return maps[room][gy] && maps[room][gy][gx]===1;
}

const trees=[];
function generateTrees(){
    if(trees.length) return;
    for(let x=0;x<W;x++) for(let y=0;y<H;y++){
        if(y >= PY-1 && y <= PY+2) continue;
        let zonaRispettoTempio = (x >= 20 && x <= 35 && y >= 1 && y <= 11);
        if(!zonaRispettoTempio && Math.random() < 0.85) trees.push({x,y,h:0.8+Math.random()*1.4,color:Math.floor(Math.random()*3)});
    }
}

function updateNearby() {
    nearbyInteractable = null;
    let px = player.x + 12;
    let py = player.y + 30;
    
    // ========================================================
    // CONTROLLI STANZA 1
    // ========================================================
    if (room === 1) {
        let altar = room1Props.find(p => p.id === 'altar');
        if (altar && puzzle.keyAppeared && !puzzle.hasKey) {
            let dx = px - (altar.x + altar.w / 2);
            let dy = py - (altar.y + altar.h);
            let dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < 120) {
                nearbyInteractable = altar;
                return;
            }
        }
        room1Props.forEach(p => {
            let dx, dy, dist;
            if (p.id === 'statue') {
                dx = px - (p.x + p.w / 2);
                dy = py - (p.y + p.h + 10);
                dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 65) nearbyInteractable = p;
            }
        });
    }

    // ========================================================
    // CONTROLLI STANZA 2
    // ========================================================
    if (room === 2) {
        if (typeof goldenKey !== 'undefined' && goldenKey.active && !goldenKey.collected) {
            let dx = px - goldenKey.x;
            let dy = py - goldenKey.y;
            let dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < 65) {
                // Impostiamo sia id che id_name per evitare conflitti nei controlli successivi
                nearbyInteractable = { id: 'goldenKey', id_name: 'goldenKey', x: goldenKey.x, y: goldenKey.y };
                return;
            }
        }

        // Controllo NPC standard Stanza 2
        if (typeof room2NPCs !== 'undefined') {
            room2NPCs.forEach(n => {
                if (heraclitusGame.freeRoam && n.id_name !== 'eraclito') {
                    return;
                }
                let dx = px - (n.x + n.w / 2);
                let dy = py - (n.y + n.h + 10);
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 65) {
                    nearbyInteractable = n;
                }
            });
        }

        // Eraclito Speciale
        if (gameState === "heraclitus" && heraclitusGame.finalZone) {
            const n = heraclitusGame.npc;
            let dx = px - (n.x + n.w / 2);
            let dy = py - (n.y + n.h);
            let dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < 90) {
                nearbyInteractable = {
                    id: 'npc',
                    id_name: 'eraclito',
                    info: "ERACLITO"
                };
            }
        }

        // Gestione vittoria finale Parmenide
        if (parmenideGame.finalZone) {
            parmenideGame.active = false;
            parmenideGame.finalZone = false;
            parmenideGame.completed = true;
            gameState = "victory";

            dialogue = [
                "HAI COMPRESO L’ESSERE",
                "TUTTO È IMMUTABILE"
            ];
            return;
        }
    }
  // =========================================
    // ROOM 3 (TRIBUNALE)
    // =========================================
    else if (room === 3) {
        // Controllo della chiave di Socrate a terra
        if (typeof roomKey !== 'undefined' && roomKey.visible && !roomKey.collected) {
            const dx = (player.x + player.w / 2) - roomKey.x;
            const dy = (player.y + player.h / 2) - roomKey.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < 60) {
                roomKey.visible = false;
                roomKey.collected = true;
                nearbyInteractable = null;
                dialogue = ["Hai raccolto la Chiave del Destino di Socrate!", "Portala alla porta a Nord per avanzare."];
                return;
            }
        }

        // Interazione con Socrate per avviare il processo (lascia intatto il tuo raggio d'azione)
     // Interazione con Socrate per avviare il processo (Aggiornato: si disattiva se hai finito!)

        if (socrateObj && gameState === "world") {
            // 🛑 SE IL PROCESSO È FINITO (la chiave esiste già a terra o è raccolta), AZZERA TUTTO E DISATTIVA
            if (typeof roomKey !== 'undefined' && (roomKey.visible || roomKey.collected)) {
                if (nearbyInteractable === socrateObj) {

                }

            } else {
                // Se il processo NON è finito, calcola la distanza normalmente
                let dx = px - (socrateObj.x + socrateObj.w / 2);
                let dy = py - (socrateObj.y + socrateObj.h + 10);

function drawFlame(x, y) {
    let t = Date.now() * 0.008;
    let flicker = Math.sin(t * 10) * 3;
    // Alone di luce soffusa
    let g = ctx.createRadialGradient(x, y-20, 0, x, y-20, 80);
    g.addColorStop(0, 'rgba(255, 150, 0, 0.2)');
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x, y-20, 80, 0, Math.PI*2); ctx.fill();
   
    // Fiamma
    ctx.fillStyle = '#ff6600';
    ctx.beginPath();
    ctx.moveTo(x-6, y);
    ctx.bezierCurveTo(x-10, y-15, x+4, y-25+flicker, x, y-35+flicker);
    ctx.bezierCurveTo(x+10, y-20, x+8, y-10, x+6, y);
    ctx.fill();
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath(); ctx.arc(x, y-10, 4, 0, Math.PI*2); ctx.fill();
}

function drawClassicColumn(x, y) {

    // Capitello
    ctx.fillStyle = '#aaa'; ctx.fillRect(x-25, y-5, 50, 15);

}

function drawNobleStatue(p) {
    const {x, y, w, h, color} = p;
    ctx.save();
    // 1. BASAMENTO
    ctx.fillStyle = '#333'; ctx.fillRect(x-10, y+h-20, w+20, 25);
    ctx.fillStyle = '#555'; ctx.fillRect(x-5, y+h-35, w+10, 15);
    // 2. ALONE TIPO FIAMMA (Solo se risolta)
    if(puzzle.solvedQuizzes.includes(p.id_name)) {
        ctx.save();
        // L'effetto 'lighter' rende il colore brillante come una sorgente luminosa
        ctx.globalCompositeOperation = 'lighter';
       
        // Creiamo il gradiente circolare (l'alone)
        // Parte dal centro della statua (x + w/2, y + h/2)
        let glow = ctx.createRadialGradient(
            x + w/2, y + h/2, 5,   // Cerchio interno
            x + w/2, y + h/2, 100  // Raggio dell'alone (regolabile)
        );
        glow.addColorStop(0, color);           // Colore pieno al centro
        glow.addColorStop(0.3, color);         // Mantiene il colore per un po'
        glow.addColorStop(1, 'transparent');   // Sfuma nel buio
        ctx.fillStyle = glow;
        ctx.globalAlpha = 0.6; // Opacità dell'alone
        ctx.beginPath();
        ctx.arc(x + w/2, y + h/2, 100, 0, Math.PI * 2);
        ctx.fill();
        // 3. LA CORNICE RETTANGOLARE COLORATA (Che avevi chiesto)
        ctx.shadowBlur = 15;
        ctx.shadowColor = color;
        ctx.strokeStyle = color;
        ctx.lineWidth = 4;
        ctx.globalAlpha = 1.0;
        ctx.strokeRect(x+5, y+5, w-10, h-45);
        ctx.restore();
    }
    // 4. FORMA UMANA (Toga/Marmo) - Ripristinata esattamente come l'avevi
    ctx.fillStyle = '#dcdde1';
    ctx.beginPath();
    ctx.moveTo(x+w/2-20, y+40);
    ctx.lineTo(x+w/2+20, y+40);
    ctx.lineTo(x+w, y+h-35);
    ctx.lineTo(x, y+h-35);
    ctx.closePath();
    ctx.fill();
    // Dettagli toga
    ctx.strokeStyle = '#b2bec3';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x+w/2, y+45);
    ctx.lineTo(x+w/2-10, y+h-35);
    ctx.stroke();
    // Testa
    ctx.fillStyle = '#ececec';
    ctx.beginPath();
    ctx.arc(x+w/2, y+25, 18, 0, Math.PI*2);
    ctx.fill();
    // Naso/Dettaglio volto
    ctx.fillStyle = '#b2bec3';
    ctx.fillRect(x+w/2-2, y+22, 4, 10); 
    ctx.restore();
}

function drawDialogue() {
    if (!dialogue) return;
    // Reset fondamentale degli allineamenti
    ctx.textAlign = "left";
    ctx.textBaseline = "top";
    // Disegno del Box
    ctx.fillStyle = 'rgba(10, 10, 20, 0.95)';
    ctx.strokeStyle = '#c9b27a';
    ctx.lineWidth = 4;
    ctx.fillRect(100, 420, 1000, 200); // Box leggermente più alto
    ctx.strokeRect(100, 420, 1000, 200);
    ctx.fillStyle = '#ffffff';
    ctx.font = '20px Georgia'; // Font leggermente ridotto per le domande lunghe  
    let startX = 130;
    let startY = 445;
    let maxWidth = 940;
    let currentY = startY;
    // Calcolo dinamico dell'altezza della linea (se ci sono tante righe, le stringe)
    let totalLinesNeeded = 0;
    dialogue.forEach(text => {
        let words = text.split(' ');
        let line = '';
        for (let n = 0; n < words.length; n++) {
            let testLine = line + words[n] + ' ';
            if (ctx.measureText(testLine).width > maxWidth && n > 0) {
                totalLinesNeeded++;
                line = words[n] + ' ';
            } else {
                line = testLine;
            }
        }
        totalLinesNeeded++;
    });
    // Se le righe sono troppe, abbassa l'interlinea (lineHeight)
    let lineHeight = totalLinesNeeded > 6 ? 24 : 28;
  // Disegno effettivo con Word-Wrap
    dialogue.forEach(text => {
        let words = text.split(' ');
        let line = '';
        for (let n = 0; n < words.length; n++) {
            let testLine = line + words[n] + ' ';
            let metrics = ctx.measureText(testLine);
           
            if (metrics.width > maxWidth && n > 0) {
                ctx.fillText(line, startX, currentY);
                line = words[n] + ' ';
                currentY += lineHeight;
            } else {
                line = testLine;
            }
        }
        ctx.fillText(line, startX, currentY);
        currentY += lineHeight; // Spazio tra paragrafi
    });
}

        parmenideGame.timer--;
        if (parmenideGame.timer <= 0) startChoicePhase();

function updateHeraclitusGame() {
    if (!heraclitusGame.active) return;
    if (heraclitusGame.gameOver) return;
    if (heraclitusGame.won) return;
    // TIMER SOLO SE NON IN FREE ROAM
    if (!heraclitusGame.freeRoam) {
        heraclitusGame.scrollY += 6;
        heraclitusGame.timer--;
        if (heraclitusGame.timer <= 0) {
            heraclitusGame.timer = heraclitusGame.maxTimer;
            evaluateHeraclitusAnswer();
            nextHeraclitusRound();
        }
    }
}


function evaluateHeraclitusAnswer() {
    let playerLane = heraclitusGame.currentLane;
    let chosenWord = heraclitusGame.options[playerLane];
    let correctWord = heraclitusGame.answerMap?.[heraclitusGame.guideWord];
    if (!chosenWord || heraclitusGame.evaluated) return;
    
    heraclitusGame.evaluated = true;
    let isCorrect = (chosenWord === correctWord);

    if (isCorrect) {
        heraclitusGame.flash = 'green';
        heraclitusGame.flashTimer = 10;
        clearTimeout(heraclitusGame.flashTimeout);
        heraclitusGame.flashTimeout = setTimeout(() => { heraclitusGame.flash = null; }, 150);
        heraclitusGame.progress++;
        heraclitusGame.progressPos -= 1;

        // 🔥 VERIFICA VITTORIA MINIGIOCO ERACLITO (RIPARATA)
        // VERIFICA VITTORIA MINIGIOCO ERACLITO
        if (heraclitusGame.progress >= 4) {
            heraclitusGame.won = true;
            heraclitusGame.active = false;
            heraclitusGame.completed = true;
            heraclitusGame.finalZone = false;
            heraclitusGame.freeRoam = false;
            heraclitusGame.postWin = false;
            
            philosophersCompleted.eraclito = true;
            gameState = "world"; // Torna alla mappa
            for (let key in keys) { keys[key] = false; }

            heraclitusGame.guideWord = "";
            heraclitusGame.options = [];
            heraclitusGame.currentLane = 0;
            heraclitusGame.logostextShown = false; 

            // 🔥 PASSIAMO "eraclito" ALLA FUNZIONE DELLA CHIAVE
            checkGoldenKeyUnlock("eraclito");
            
            if (typeof updateNearby === 'function') updateNearby();
            return;
        }

        if (heraclitusGame.lanes < 5) heraclitusGame.lanes++;
    } else {
        heraclitusGame.flash = 'red';
        heraclitusGame.progressPos += 1;
        heraclitusGame.mistakes++;
        heraclitusGame.lives--;
        if (heraclitusGame.lives <= 0) {
            heraclitusGame.gameOver = true;
            heraclitusGame.flashTimer = 20;
            return;
        }
    }
    heraclitusGame.flashTimer = 20;
}

function checkGoldenKeyUnlock(ultimoCompletato) {
    if (typeof goldenKey === 'undefined') return;

    // ==================================================================
    // 🏆 CASO FINALE: ENTRAMBI COMPLETATI (Scatta quando finisci il SECONDO)
    // ==================================================================
    if (philosophersCompleted.eraclito && philosophersCompleted.parmenide) {
        if (!goldenKey.collected && !goldenKey.active) {
            // Fai apparire la chiave al centro della stanza
            goldenKey.active = true;
            goldenKey.x = 600;
            goldenKey.y = 450;
            goldenKey.followPlayer = false;
            gameState = "world"; // Forza il ritorno alla mappa
            for (let key in keys) { keys[key] = false; }

            // Sceglie il testo in base a chi hai fatto per ULTIMO delle due opzioni
            if (ultimoCompletato === "parmenide") {
                // OPZIONE 1: Eraclito fatto per primo, Parmenide fatto per secondo
                dialogue = [
                    "PARMENIDE: Complimenti, hai superato anche la mia prova!",
                    "I frammenti dell'Essere e del Divenire si fondono in un'unica armonia...",
                    "HAI SBLOCCATO LA CHIAVE D'ORO!",
                    "Raccoglila e portala alla grande porta a Nord per aprirla e andare avanti!"
                ];
            } else if (ultimoCompletato === "eraclito") {
                // OPZIONE 2: Parmenide fatto per primo, Eraclito fatto per secondo
                dialogue = [
                    "ERACLITO: Complimenti, hai superato anche la mia prova!",
                    "Il flusso e l'immutabilità trovano finalmente un punto d'incontro...",
                    "HAI SBLOCCATO LA VERA CHIAVE D'ORO!",
                    "Raccoglila e portala alla grande porta a Nord per aprirla e andare avanti!"
                ];
            }
        }
        return; // Esci subito
    }

    // ==================================================================
    // ⏳ CASO PARZIALE: HAI FATTO SOLO IL PRIMO FILOSOFO
    // ==================================================================
    // Se hai fatto SOLO Eraclito (e Parmenide è ancora da fare)
    if (philosophersCompleted.eraclito && !philosophersCompleted.parmenide) {
        if (!heraclitusGame.logostextShown) {
            dialogue = [
                "ERACLITO: Complimenti, hai capito la mia teoria del Logos!",
                "Per sbloccare la chiave, ora vai a fare il mini gioco di Parmenide."
            ];
            heraclitusGame.logostextShown = true;
        }
    }

    // Se hai fatto SOLO Parmenide (e Eraclito è ancora da fare)
    if (philosophersCompleted.parmenide && !philosophersCompleted.eraclito) {
        if (!parmenideGame.logostextShown) {
            dialogue = [
                "PARMENIDE: Complimenti, hai capito la mia visione sull'Essere!",
                "Per sbloccare la chiave, ora devi svolgere il minigioco di Eraclito."
            ];
            parmenideGame.logostextShown = true;
        }
    }
}

    console.log(choice.response);

    nextDialog();
}

function drawDialogUI() {
    if (gameState !== "dialog" || !currentNode) return;

    const canvasWidth = 1200; 
    const centerX = canvasWidth / 2; 

    // ==========================================
    // 🏢 1. SFONDO CINEMATICO (Box di dialogo)
    // ==========================================
    ctx.fillStyle = "rgba(15, 15, 20, 0.94)"; 
    ctx.fillRect(50, 430, canvasWidth - 100, 190); 
    
    ctx.strokeStyle = "#dbb13b";
    ctx.lineWidth = 2;
    ctx.strokeRect(50, 430, canvasWidth - 100, 190);

   // ==========================================
    // 🗣️ 2. RENDERING DEL NOME (PARLANTE)
    // ==========================================
    ctx.font = "bold 22px Georgia";
    ctx.textAlign = "center"; 
    
    if (currentNode.speaker === "socrate") {
        ctx.fillStyle = "#f1c40f"; 
        ctx.fillText("🏛️ SOCRATE", centerX, 465);
    } else if (currentNode.speaker === "meleto") {
        ctx.fillStyle = "#e74c3c"; 
        ctx.fillText("⚖️ MELETO", centerX, 465);
    } else if (currentNode.speaker === "giuria") {
        ctx.fillStyle = "#3498db"; // Colore istituzionale azzurro per il verdetto
        ctx.fillText("⚖️ VERDETTO DEL TRIBUNALE", centerX, 465);
    }

    // ==========================================
    // 📜 3. FUNZIONE DI WRAPPING AUTOMATICO (Auto A Capo)
    // ==========================================
    ctx.fillStyle = "#ffffff";
    ctx.font = "17px Georgia"; // Leggermente più piccolo per far stare i monologhi lunghi

    const maxWidth = 1040; // Larghezza massima consentita all'interno della scatola (1200 - 160 di margini)
    const lineHeight = 24; // Spazio tra una riga e l'altra
    let startY = 495;      // Altezza iniziale del testo dentro il box

    // Rimuoviamo i vecchi \n artificiali e uniamo tutto in un'unica stringa pulita,
    // mantenendo solo i doppi a capo (\n\n) se usati per separare i dialoghi di Meleto/Socrate
    let rawText = currentNode.text.replace(/(?<!\n)\n(?!\n)/g, " "); 
    let paragraphs = rawText.split("\n\n");

    paragraphs.forEach(paragraph => {
        let words = paragraph.split(" ");
        let currentLine = "";

        for (let n = 0; n < words.length; n++) {
            let testLine = currentLine + words[n] + " ";
            let metrics = ctx.measureText(testLine);
            let testWidth = metrics.width;

            // Se la parola fa sballare il testo fuori dalla scatola, disegna la riga precedente e resetta
            if (testWidth > maxWidth && n > 0) {
                ctx.fillText(currentLine.trim(), centerX, startY);
                currentLine = words[n] + " ";
                startY += lineHeight;
            } else {
                currentLine = testLine;
            }
        }
        // Disegna l'ultima riga rimasta del paragrafo
        ctx.fillText(currentLine.trim(), centerX, startY);
        startY += lineHeight; 
    });

    // ==========================================
    // 🕹️ 4. OPZIONI DI SCELTA O SUGGERIMENTI
    // ==========================================
    if (currentNode.choices) {
        ctx.font = "16px Arial";
        const colWidth = (canvasWidth - 140) / 3; 
        
        currentNode.choices.forEach((c, i) => {
            let colX = 70 + (i * colWidth) + (colWidth / 2);
            
            // Box di sfondo delle scelte
            ctx.fillStyle = "rgba(255, 255, 255, 0.05)";
            ctx.fillRect(70 + (i * colWidth) + 10, 560, colWidth - 20, 45);
            ctx.strokeStyle = "rgba(255, 255, 255, 0.15)";
            ctx.strokeRect(70 + (i * colWidth) + 10, 560, colWidth - 20, 45);

            // Numero Scelta
            ctx.fillStyle = "#f39c12"; 
            ctx.font = "bold 15px Arial";
            ctx.fillText(`[ ${i + 1} ]`, colX, 578);
            
            // Testo Scelta (Adattato nel suo mini-box)
            ctx.fillStyle = "#e0e0e0"; 
            ctx.font = "12px Arial";
            ctx.fillText(c.label, colX, 594);
        });
    } else {
        ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
        ctx.font = "italic 13px Arial";
        ctx.fillText("Premi [ E ] per continuare l'udienza", centerX, 605);
    }

    // ==========================================
    // 📊 5. BARRA STATO DELLA GIURIA
    // ==========================================
    const barWidth = 300;
    const barX = centerX - (barWidth / 2); 
    const barY = 415; 
    
    ctx.fillStyle = "#2c3e50";
    ctx.fillRect(barX, barY, barWidth, 8);
    
    ctx.fillStyle = juryScore >= 50 ? "#2ecc71" : "#e67e22";
    ctx.fillRect(barX, barY, (juryScore / 100) * barWidth, 8);
    
    ctx.fillStyle = "#f1c40f";
    ctx.font = "bold 11px Arial";
    ctx.fillText(`FAVORE DEI GIUDICI: ${juryScore}%`, centerX, barY - 5);
}

function drawCourtroomScene() {

            ctx.fillRect(i, j, 60, 60);
        }
    }

    drawAtmosphericLighting();

    // =========================

    colY.forEach(y => {

    for (let r = 0; r < rows; r++) {

function checkKeyCollection() {
    if (!roomKey.visible || roomKey.collected) return;

    // Calcolo distanza geometrica tra il giocatore e la chiave
    let distX = player.x - roomKey.x;
    let distY = player.y - roomKey.y;
    let distance = Math.sqrt(distX * distX + distY * distY);

    // Se il giocatore è a meno di 35 pixel dalla chiave, la raccoglie automatically
    if (distance < 35) {
        roomKey.collected = true;
        roomKey.visible = false;
        
        // Setup di un messaggio a schermo intero usando il tuo sistema globale già esistente
        globalEventMessage = "Hai ottenuto la Chiave dell'Ultima Stanza!";
        globalEventTimer = 120; // Mostra il messaggio per circa 2 secondi
    }
}

function isBlocked(x, y) {
    // =========================
    // BORDI MAPPA
    // =========================
    if (x < 0 || x > 1160 || y < 0 || y > 600) {
        return true;
    }

    // =========================
    // PUBBLICO (AREA INTERA)
    // =========================
    const tileX = Math.floor(x / 60);
    const tileY = Math.floor(y / 60);

    // sinistra pubblico
    if (tileX >= 2 && tileX <= 8 && tileY >= 4 && tileY <= 9) {
        return true;
    }

    // destra pubblico
    if (tileX >= 11 && tileX <= 17 && tileY >= 4 && tileY <= 9) {
        return true;
    }

    // =========================
    // SOCRATE + MELETO (AREA SEMPLICE)
    // =========================
    if (x > 360 && x < 460 && y > 150 && y < 250) {
        return true;
    }

    if (x > 700 && x < 820 && y > 150 && y < 250) {
        return true;
    }

    return false;
}

function drawAtmosphericLighting() {
    const canvasW = ctx.canvas.width;
    const canvasH = ctx.canvas.height;

    ctx.save();
    
    // 1. PENOMBRA MOLTO LEGGERA (Stanza nettamente più chiara e visibile)
    ctx.globalCompositeOperation = 'multiply';
    
    let ambientGlow = ctx.createRadialGradient(
        canvasW / 2, canvasH / 2, canvasH / 1.5, 
        canvasW / 2, canvasH / 2, canvasW
    );
    // Valori alti: la stanza adesso è illuminata e i dettagli si vedono benissimo
    ambientGlow.addColorStop(0, '#bbbbbb'); 
    ambientGlow.addColorStop(1, '#777777'); 
    
    ctx.fillStyle = ambientGlow;
    ctx.fillRect(0, 0, canvasW, canvasH);
    
    ctx.restore();

    // 2. EFFETTI DI LUCE SOFFUSA (Colonne e Statue)
    ctx.save();
    ctx.globalCompositeOperation = 'lighter'; 

    // 🔥 EFFETTO TARANTELLA SULLE COLONNE (Morbido e suggestivo)
    if (typeof pillars !== 'undefined' && room === 1) {
        pillars.forEach(p => {
            let colX = p[0];
            let colY = p[1]; 
            
            let t = Date.now() * 0.006;
            let flicker = Math.sin(t * 8) * 5; 

            // Luce calda ma più trasparente per non bruciare i dettagli della colonna
            let columnGlow = ctx.createRadialGradient(
                colX, colY - 10, 5,
                colX, colY - 10, 150 + flicker
            );
            columnGlow.addColorStop(0, 'rgba(255, 130, 40, 0.35)'); 
            columnGlow.addColorStop(0.4, 'rgba(255, 100, 20, 0.12)'); 
            columnGlow.addColorStop(1, 'transparent'); 
            
            ctx.fillStyle = columnGlow;
            ctx.beginPath();
            ctx.arc(colX, colY - 10, 150 + flicker, 0, Math.PI * 2);
            ctx.fill();
        });
    }

    // 🗿 ALONI DELLE STATUE ATTIVATE (Trasparenti, non coprono il disegno!)
    if (room === 1) {
        room1Props.forEach(p => {
            if (p.id === 'statue' && puzzle.solvedQuizzes.includes(p.id_name)) {
                let t = Date.now() * 0.004;
                let pulse = Math.sin(t * 5) * 6;
                
                let statueGlow = ctx.createRadialGradient(
                    p.x + p.w/2, p.y + p.h/2, 10,
                    p.x + p.w/2, p.y + p.h/2, 120 + pulse
                );
                
                // Convertiamo i colori in RGBA semitrasparenti (solo un'ombra di colore)
                let r=0, g=0, b=0;
                if(p.id_name === 'talete') { r=52; g=152; b=219; }       // Azzurro morbido
                if(p.id_name === 'anassimandro') { r=155; g=89; b=182; } // Viola morbido
                if(p.id_name === 'anassimene') { r=189; g=195; b=199; }   // Grigio/Bianco mistico

                statueGlow.addColorStop(0, `rgba(${r}, ${g}, ${b}, 0.25)`); // Solo il 25% di opacità al centro!
                statueGlow.addColorStop(0.5, `rgba(${r}, ${g}, ${b}, 0.08)`);
                statueGlow.addColorStop(1, 'transparent');
                
                ctx.fillStyle = statueGlow;
                ctx.beginPath();
                ctx.arc(p.x + p.w/2, p.y + p.h/2, 120 + pulse, 0, Math.PI*2);
                ctx.fill();
            }
        });
    }

    ctx.restore();
}

function distance(a, b) {
    const dx = a.x - b.x;
    const dy = a.y - b.y;
    return Math.sqrt(dx * dx + dy * dy);
}

function drawPlatoRoom() {
    // Se siamo nella schermata di vittoria, interrompiamo il disegno della stanza standard 
    // e mostriamo SOLO la schermata di vittoria nera, senza omino.
    if (gameState === "platoWin") {
        drawPlatoWinScreen();
        return; 
    }

    // 1. Colonne laterali
    room4Pillars.forEach(p => {
        if (typeof drawClassicColumn === 'function') {
            drawClassicColumn(p.x, p.y);
        } else {
            ctx.fillStyle = "#dcdde1"; ctx.fillRect(p.x, p.y, 60, 130);
        }
    });

    // 2. Controllo dello Stato Grafico (Prima o Durante il Minigioco)
    if (!platoneGameAttivo) {
        // Mostra le Grandi Statue fino a quando non si gioca
        drawSensibleStatue(250, 280);
        ctx.fillStyle = "#7f8c8d"; ctx.font = "bold 14px Georgia"; ctx.textAlign = "center";
        ctx.fillText("IL MONDO SENSIBILE", 290, 385);

        drawIdeasStatue(870, 280);
        ctx.fillStyle = "#f1c40f"; ctx.font = "bold 14px Georgia"; ctx.textAlign = "center";
        ctx.fillText("L'IPERURANIO", 910, 385);

    } else {
        // --- GRAFICA DEL MINIGIOCO ATTIVO ---
        ctx.strokeStyle = "rgba(52, 152, 219, 0.3)";
        ctx.lineWidth = 4; ctx.setLineDash([15, 15]);
        ctx.beginPath(); ctx.moveTo(120, 320); ctx.lineTo(1080, 320); ctx.stroke();
        ctx.setLineDash([]); 

        ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
        ctx.font = "bold 22px Georgia"; ctx.textAlign = "left";
        ctx.fillText("IPERURANIO (Modelli Eterni)", 150, 70);
        ctx.fillText("MONDO SENSIBILE (Copie Imperfette)", 150, 590);

        // Disegno i punti di interazione del minigioco usando l'array corretto (platoGameObjects)
        let oggettiGioco = (typeof platoGameObjects !== 'undefined' && platoGameObjects.length > 0) ? platoGameObjects : room4Collisions;
        
        oggettiGioco.forEach(obj => {
            if (!obj.id) return;
            
            if (obj.id.startsWith("copia") || obj.type === "copia") {
                ctx.fillStyle = "#95a5a6"; ctx.fillRect(obj.x, obj.y, obj.w || 60, obj.h || 60);
                ctx.strokeStyle = "#34495e"; ctx.strokeRect(obj.x, obj.y, obj.w || 60, obj.h || 60);
                if (!obj.attivato && !obj.collegato) {
                    ctx.strokeStyle = "#c0392b"; ctx.beginPath();
                    ctx.moveTo(obj.x+10, obj.y+10); ctx.lineTo(obj.x+(obj.w||60)-10, obj.y+(obj.h||60)-10); ctx.stroke();
                }
                ctx.fillStyle = "#666"; ctx.font = "12px Arial"; ctx.textAlign = "center";
                ctx.fillText(obj.nome, obj.x + (obj.w||60)/2, obj.y + (obj.h||60) + 15);
            } 
            else if (obj.id.startsWith("idea") || obj.type === "idea") {
                let auraPulse = Math.sin(Date.now() * 0.007) * 4;
                ctx.fillStyle = "rgba(241, 196, 15, 0.3)";
                ctx.beginPath(); ctx.arc(obj.x+30, obj.y+30, 35 + auraPulse, 0, Math.PI*2); ctx.fill();
                
                ctx.fillStyle = "#f1c40f"; ctx.fillRect(obj.x, obj.y, obj.w || 60, obj.h || 60);
                ctx.fillStyle = "#f39c12"; ctx.font = "bold 12px Georgia"; ctx.textAlign = "center";
                ctx.fillText(obj.nome, obj.x + (obj.w||60)/2, obj.y - 15);
            }
        });
    }

    // 3. Platone al centro
    if (typeof drawPhilosopher === 'function') {
        drawPhilosopher(platoneNPC);
    } else {
        ctx.fillStyle = platoneNPC.color; ctx.fillRect(platoneNPC.x, platoneNPC.y, platoneNPC.w, platoneNPC.h);
    }

    // --- PROMPT VISIVO "[E] PARLA CON PLATONE" ---
    if (!platoneGameAttivo && !puzzleDualismoCompletato && gameState !== "dialog") {
        let distX = (player.x + player.w/2) - (platoneNPC.x + platoneNPC.w/2);
        let distY = (player.y + player.h/2) - (platoneNPC.y + platoneNPC.h/2);
        let distanza = Math.sqrt(distX * distX + distY * distY);

        if (distanza < 75) {
            ctx.save();
            ctx.fillStyle = "#f1c40f"; 
            ctx.font = "bold 14px Arial";
            ctx.textAlign = "center";
            ctx.shadowColor = "black"; ctx.shadowBlur = 4;
            ctx.fillText("[E] Parla con Platone", player.x + player.w/2, player.y - 20);
            ctx.restore();
        }
    }

    // 4. Scia di trasporto della gemma
    if (gemmaSelezionata) {
        ctx.fillStyle = "#3498db";
        ctx.beginPath(); ctx.arc(player.x + player.w/2, player.y - 10, 6, 0, Math.PI * 2); ctx.fill();
    }

    // ==========================================
// 🚪 PORTA ROOM 4
// ==========================================
drawDoor(4);

    // Controllo di transizione automatica a fine connessioni
    if (typeof interactionState !== 'undefined' && interactionState.connections && interactionState.connections.length === 3 && !puzzleDualismoCompletato) {
        puzzleDualismoCompletato = true;
        gameState = "platoWin";
    }
}

// Disegna la Statua del Mondo Sensibile (Materia, Mutamento, Imperfezione)
function drawSensibleStatue(x, y) {
    ctx.save();

    // 1. Base della statua (Pietra grezza crepata)
    ctx.fillStyle = "#566573";
    ctx.fillRect(x, y + 40, 80, 40); // Base inferiore
    ctx.fillStyle = "#7f8c8d";
    ctx.fillRect(x + 10, y + 25, 60, 15); // Gradino superiore della base

    // Crepe sulla base
    ctx.strokeStyle = "#2c3e50";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x + 20, y + 40); ctx.lineTo(x + 25, y + 55); ctx.lineTo(x + 15, y + 70);
    ctx.moveTo(x + 65, y + 45); ctx.lineTo(x + 60, y + 65);
    ctx.stroke();

    // 2. Elemento sopra la base: Un Albero della Natura (Simbolo del mondo fisico e mutevole)
    // Tronco contorto
    ctx.fillStyle = "#5d4037";
    ctx.beginPath();
    ctx.moveTo(x + 35, y + 25);
    ctx.lineTo(x + 30, y);
    ctx.lineTo(x + 45, y - 5);
    ctx.lineTo(x + 45, y + 25);
    ctx.fill();

    // Chioma asimmetrica (Foglie della natura terrena)
    ctx.fillStyle = "#1e8449";
    ctx.beginPath();
    ctx.arc(x + 25, y - 10, 18, 0, Math.PI * 2);
    ctx.arc(x + 45, y - 15, 22, 0, Math.PI * 2);
    ctx.arc(x + 55, y, 15, 0, Math.PI * 2);
    ctx.fill();

    // Un tocco di foglie secche/cadenti (Simbolo del tempo che passa nel mondo sensibile)
    ctx.fillStyle = "#d35400";
    ctx.fillRect(x + 20, y + 15, 4, 4);
    ctx.fillRect(x + 58, y + 20, 4, 4);

    ctx.restore();
}

// Disegna la Statua del Mondo delle Idee (Iperuranio, Perfezione, Eternità)
function drawIdeasStatue(x, y) {
    ctx.save();

    let pulse = Math.sin(Date.now() * 0.005) * 4;

    // 1. Aura di luce divina retrostante
    let aura = ctx.createRadialGradient(x + 40, y, 5, x + 40, y, 45 + pulse);
    aura.addColorStop(0, 'rgba(241, 196, 15, 0.4)');
    aura.addColorStop(1, 'rgba(241, 196, 15, 0)');
    ctx.fillStyle = aura;
    ctx.beginPath();
    ctx.arc(x + 40, y, 45 + pulse, 0, Math.PI * 2);
    ctx.fill();

    // 2. Base della statua (Marmo bianco lucido e oro)
    ctx.fillStyle = "#cbd5e1"; // Marmo bianco
    ctx.fillRect(x, y + 40, 80, 40);
    ctx.fillStyle = "#f1c40f"; // Finitura dorata superiore
    ctx.fillRect(x + 5, y + 25, 70, 15);

    // Righe verticali eleganti sulla base (stile tempio perfetto)
    ctx.strokeStyle = "#b2bec3";
    ctx.lineWidth = 2;
    for(let i = x + 15; i <= x + 65; i += 15) {
        ctx.beginPath(); ctx.moveTo(i, y + 40); ctx.lineTo(i, y + 80); ctx.stroke();
    }

    // 3. Elemento Fluttuante sopra la base: I Solidi Geometrici Perfetti (Simboli delle Idee di Platone)
    // Triangolo Equilatero Dorato (Forma geometrica immutabile)
    ctx.fillStyle = "#f39c12";
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 2;
    ctx.shadowBlur = 10;
    ctx.shadowColor = "#f1c40f"; // Bagliore all'oggetto

    ctx.beginPath();
    ctx.moveTo(x + 40, y - 25 + pulse * 0.5);       // Vertice alto
    ctx.lineTo(x + 15, y + 10 + pulse * 0.5);       // Angolo sinistro
    ctx.lineTo(x + 65, y + 10 + pulse * 0.5);       // Angolo destro
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Piccola Sfera di Luce Pura al centro del triangolo
    ctx.fillStyle = "#ffffff";
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(x + 40, y - 2 + pulse * 0.5, 6, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
}

function drawPlatoGameScreen() {
   // Se il gioco è vinto, mostra SOLO la schermata di vittoria e blocca il rendering del gioco
    if (gameState === "platoWin") {
        drawPlatoWinScreen();
        return; 
    }
    // 1. Sfondo totale: Pavimento a scacchi chiaro
    for (let i = 0; i < 1200; i += 60) {
        for (let j = 0; j < 640; j += 60) {
            ctx.fillStyle = ((i + j) / 60 % 2 === 0) ? '#f5f6fa' : '#dcdde1';
            ctx.fillRect(i, j, 60, 60);
            ctx.strokeStyle = 'rgba(0,0,0,0.03)';
            ctx.strokeRect(i, j, 60, 60);
        }
    }

    // 2. Linea di Confine (Azzurra Tratteggiata)
    ctx.save();
    ctx.strokeStyle = "rgba(52, 152, 219, 0.5)";
    ctx.lineWidth = 4;
    ctx.setLineDash([15, 12]);
    ctx.beginPath(); 
    ctx.moveTo(0, 320); 
    ctx.lineTo(1200, 320); 
    ctx.stroke();
    ctx.restore();

    // 3. Testi di Intestazione dei Mondi
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    
    ctx.font = "bold 24px Georgia";
    ctx.fillStyle = "#d35400"; 
    ctx.fillText("IPERURANIO (LE IDEE PERFETTE)", 600, 40);

    ctx.fillStyle = "#2c3e50"; 
    ctx.fillText("MONDO SENSIBILE (LE COPIE IMPERFETTE)", 600, 590);

    ctx.font = "14px Arial";
    ctx.fillStyle = "#7f8c8d";
    

    // 4. DISEGNO DELLE CORDE LUMINOSE (Sotto le statue)
    ctx.save();
    // A. Corde collegate stabilmente (Neon Oro)
    interactionState.connections.forEach(sensibileId => {
        let sensibileStatue = platoStatues.find(s => s.id === sensibileId);
        let iperuranioStatue = platoStatues.find(s => s.id === sensibileStatue.targetId);

        ctx.shadowBlur = 15;
        ctx.shadowColor = "#f1c40f";
        ctx.strokeStyle = "rgba(241, 196, 15, 0.8)";
        ctx.lineWidth = 5;
        
        ctx.beginPath();
        ctx.moveTo(sensibileStatue.x, sensibileStatue.y);
        ctx.lineTo(iperuranioStatue.x, iperuranioStatue.y);
        ctx.stroke();
    });

    // B. Corda mobile legata al giocatore (Neon Azzurro)
    if (interactionState.selectedStatue) {
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#3498db"; 
        ctx.strokeStyle = "rgba(52, 152, 219, 0.9)";
        ctx.lineWidth = 4;

        ctx.beginPath();
        ctx.moveTo(interactionState.selectedStatue.x, interactionState.selectedStatue.y);
        ctx.lineTo(player.x, player.y); 
        ctx.stroke();
    }
    ctx.restore();

    // Variable di supporto per tracciare se mostrare l'UI sopra il player
    let currentNearbyStatue = null;

    // ... (I punti 1, 2, 3 e 4 rimangono uguali a prima) ...

   // ========================================================
    // 5. GESTIONE Y-SORTING (DISEGNO AD ALTEZZA DINAMICA)
    // ========================================================
    let elementiDaDisegnare = [];

    platoStatues.forEach(statue => {
        elementiDaDisegnare.push({
            tipo: "statua",
            yRiferimento: statue.y + 20,
            dati: statue
        });
    });

    // 🔥 MODIFICA: Inseriamo il giocatore solo se NON siamo nella schermata di vittoria
    if (typeof player !== 'undefined' && gameState !== "platoWin") {
        elementiDaDisegnare.push({
            tipo: "giocatore",
            yRiferimento: player.y, // I piedi del giocatore
            dati: player
        });
    }

    // Ordina l'array in base alla coordinata Y
    elementiDaDisegnare.sort((a, b) => a.yRiferimento - b.yRiferimento);
    elementiDaDisegnare.forEach(elemento => {
        if (elemento.tipo === "statua") {
            let statue = elemento.dati;
            
            drawPedestal(statue.x, statue.y);

            if (statue.world === "iperuranio") {
                if (statue.type === "triangle") drawPerfectTriangle(statue.x, statue.y - 40);
                if (statue.type === "human")    drawPerfectHuman(statue.x, statue.y - 40);
                if (statue.type === "scale")    drawPerfectScale(statue.x, statue.y - 40);
            } else {
                if (statue.type === "triangle") drawImperfectTriangle(statue.x, statue.y - 40);
                if (statue.type === "human")    drawImperfectHuman(statue.x, statue.y - 40);
                if (statue.type === "scale")    drawImperfectScale(statue.x, statue.y - 40);
            }

            if (Math.hypot(player.x - statue.x, player.y - statue.y) < statue.interactDist) {
                currentNearbyStatue = statue;
            }
        } 
        else if (elemento.tipo === "giocatore") {
            player.isMoving =
                keys.w || keys.a || keys.s || keys.d ||
                keys.ArrowUp || keys.ArrowDown || keys.ArrowLeft || keys.ArrowRight;
            drawPlayer(player.x, player.y);
        }
    });

    // 6. INTERFACCIA UI (Sopra la testa del giocatore, sempre visibile in primo piano)
    if (currentNearbyStatue && !dialogue && !isTyping) {
        ctx.save();
        ctx.textAlign = 'center';
        
        if (!interactionState.selectedStatue) {
            if (currentNearbyStatue.world === "sensibile" && !interactionState.connections.includes(currentNearbyStatue.id)) {
                ctx.fillStyle = "#333366"; 
                ctx.font = "bold 16px Georgia";
                ctx.fillText("[E] Lega corda", player.x + 25, player.y - 20);
            }
        } else {
            if (currentNearbyStatue.world === "iperuranio") {
                ctx.fillStyle = "#333366"; 
                ctx.font = "bold 16px Georgia";
                ctx.fillText("[E] Unisci statue", player.x + 25, player.y - 20);
            }
        }
        ctx.restore();
    }

    // Gestione messaggi di evento globale
    if (typeof globalEventTimer !== 'undefined' && globalEventTimer > 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, 1200, 640);
        ctx.fillStyle = '#f1c40f';
        ctx.font = 'bold 42px Georgia';
        ctx.textAlign = 'center';
        ctx.fillText(globalEventMessage, 600, 320);
        globalEventTimer--;
    }
    
    if (interactionState.connections.length === 3 && !puzzleDualismoCompletato) {
    puzzleDualismoCompletato = true;
    gameState = "platoWin";
}
}

    ctx.textAlign = "center";

    ctx.fillStyle = "#f1c40f";
    ctx.font = "bold 40px Georgia";
    ctx.fillText("DUALISMO COMPLETATO", 600, 250);

    ctx.fillStyle = "#ecf0f1";
    ctx.font = "20px Arial";
    ctx.fillText("Hai ricongiunto le copie alle loro Idee eterne", 600, 310);

    ctx.fillText("Premi [E] per uscire dall'Iperuranio", 600, 380);
}
// --- PIEDISTALLO SCURITO (Ottimo contrasto sul pavimento bianco) ---
function drawPedestal(x, y) {
    ctx.save();

    // Ombra terra
    ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
    ctx.beginPath();
    ctx.ellipse(x, y + 40, 55, 15, 0, 0, Math.PI * 2);
    ctx.fill();

    // Base (Grigio Pietra Scuro)
    ctx.fillStyle = "#57606f";
    ctx.fillRect(x - 50, y + 20, 100, 20);

    // Corpo centrale (Grigio Medio)
    ctx.fillStyle = "#747d8c";
    ctx.fillRect(x - 35, y - 20, 70, 40);
    // Dettagli scanalature staccate
    ctx.fillStyle = "#2f3542";
    ctx.fillRect(x - 20, y - 20, 4, 40);
    ctx.fillRect(x + 16, y - 20, 4, 40);

    // Top (Grigio Pietra Chiaro per far staccare la statua)
    ctx.fillStyle = "#a4b0be";
    ctx.fillRect(x - 40, y - 30, 80, 12);
    
    ctx.restore();
}

// ==========================================
//          IPERURANIO (PERFEZIONE ASSOLUTA)
// ==========================================

function drawPerfectTriangle(x, y) {
    ctx.save();
    
    // Bagliore d'oro
    let glow = ctx.createRadialGradient(x, y - 20, 0, x, y - 20, 50);
    glow.addColorStop(0, 'rgba(241, 196, 15, 0.4)');
    glow.addColorStop(1, 'rgba(241, 196, 15, 0)');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(x, y - 20, 50, 0, Math.PI*2); ctx.fill();

    // Triangolo Oro Lucido e simmetrico
    ctx.fillStyle = "#f1c40f";
    ctx.strokeStyle = "#f39c12";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(x, y - 60);       
    ctx.lineTo(x + 40, y + 10);   
    ctx.lineTo(x - 40, y + 10);   
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Luce geometrica interna
    ctx.fillStyle = "rgba(255, 255, 255, 0.35)";
    ctx.beginPath();
    ctx.moveTo(x, y - 60);
    ctx.lineTo(x, y + 10);
    ctx.lineTo(x - 40, y + 10);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
}

function drawPerfectHuman(x, y) {
    ctx.save();

    // Colore Blu Notte Epico / Divino (Molto visibile sullo sfondo)
    ctx.fillStyle = "#2e86de";
    ctx.strokeStyle = "#10ac84";
    ctx.lineWidth = 2.5;

    // Testa (Cerchio Perfetto)
    ctx.beginPath(); ctx.arc(x, y - 55, 12, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

    // Busto Canonico e dritto
    ctx.beginPath();
    ctx.moveTo(x - 16, y - 40); ctx.lineTo(x + 16, y - 40);
    ctx.lineTo(x + 10, y - 5); ctx.lineTo(x - 10, y - 5);
    ctx.closePath(); ctx.fill(); ctx.stroke();

    // Braccia simmetriche parallele
    ctx.fillRect(x - 36, y - 36, 20, 6);
    ctx.fillRect(x + 16, y - 36, 20, 6);

    // Gambe dritte e stabili
    ctx.fillRect(x - 9, y - 5, 8, 30);
    ctx.fillRect(x + 1, y - 5, 8, 30);

    ctx.restore();
}

function drawPerfectScale(x, y) {
    ctx.save();
    
    // Colore Smeraldo/Platino Energetico
    ctx.fillStyle = "#1dd1a1";
    ctx.strokeStyle = "#10ac84";
    ctx.lineWidth = 3;

    ctx.fillRect(x - 4, y - 55, 8, 75); // Palo
    
    ctx.fillStyle = "#f1c40f"; // Fulcro d'oro
    ctx.beginPath(); ctx.arc(x, y - 51, 6, 0, Math.PI*2); ctx.fill();

    // Barra perfettamente parallela al terreno
    ctx.fillStyle = "#1dd1a1";
    ctx.fillRect(x - 45, y - 49, 90, 5);

    // Piatti identici
    ctx.strokeStyle = "#2f3542";
    ctx.lineWidth = 1.5;
    // Sinistro
    ctx.beginPath(); ctx.moveTo(x - 40, y - 45); ctx.lineTo(x - 55, y - 20); ctx.lineTo(x - 25, y - 20); ctx.closePath(); ctx.stroke();
    ctx.fillStyle = "#f1c40f"; ctx.fillRect(x - 55, y - 20, 30, 4);
    // Destro
    ctx.beginPath(); ctx.moveTo(x + 40, y - 45); ctx.lineTo(x + 25, y - 20); ctx.lineTo(x + 55, y - 20); ctx.closePath(); ctx.stroke();
    ctx.fillRect(x + 25, y - 20, 30, 4);

    ctx.restore();
}

// ==========================================
//          MONDO SENSIBILE (COPIE QUASI PERFETTE)
// ==========================================

function drawImperfectTriangle(x, y) {
    ctx.save();

    // Colore Oro meno nobile (Bronzo/Ottone più opaco)
    ctx.fillStyle = "#d4ac0d";
    ctx.strokeStyle = "#9a7d0a";
    ctx.lineWidth = 3;

    // Triangolo quasi perfetto, ma inclinato di pochissimi pixel e asimmetrico
    ctx.beginPath();
    ctx.moveTo(x + 3, y - 57);       // Punta leggermente spostata a destra
    ctx.lineTo(x + 42, y + 12);     // Angolo destro leggermente più basso
    ctx.lineTo(x - 38, y + 8);      // Angolo sinistro leggermente sfasato
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Una singola, sottile crepa superficiale (non è distrutto, è solo "corrotto" dal tempo)
    ctx.strokeStyle = "#7e5109";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x + 10, y - 20);
    ctx.lineTo(x + 5, y - 5);
    ctx.lineTo(x + 12, y + 5);
    ctx.stroke();

    ctx.restore();
}

function drawImperfectHuman(x, y) {
    ctx.save();

    // Stessi componenti della statua sopra, ma in versione "materiale" (Azzurro spento/grigiastro)
    ctx.fillStyle = "#54a0ff";
    ctx.strokeStyle = "#2e86de";
    ctx.lineWidth = 2.5;

    // Testa: non è un cerchio perfetto, è leggermente schiacciata/ovale
    ctx.beginPath(); 
    ctx.ellipse(x, y - 53, 13, 11, 0.1, 0, Math.PI * 2); 
    ctx.fill(); 
    ctx.stroke();

    // Busto: leggermente curvo (postura umana, non geometrica e rigida come l'idea)
    ctx.beginPath();
    ctx.moveTo(x - 14, y - 38); ctx.lineTo(x + 18, y - 40); // Spalle asimmetriche
    ctx.lineTo(x + 8, y - 5); ctx.lineTo(x - 11, y - 5);
    ctx.closePath(); ctx.fill(); ctx.stroke();

    // Braccia: uno è leggermente più basso dell'altro
    ctx.fillRect(x - 34, y - 34, 20, 6); // braccio sx
    ctx.fillRect(x + 18, y - 38, 20, 6); // braccio dx (più alto)

    // Gambe: una leggermente piegata
    ctx.fillRect(x - 10, y - 5, 8, 30);
    
    // Gamba destra disegnata in modo imperfetto/curvo
    ctx.beginPath();
    ctx.rect(x + 1, y - 5, 8, 26); // leggermente più corta o sollevata
    ctx.fill(); ctx.stroke();

    ctx.restore();
}

function drawImperfectScale(x, y) {
    ctx.save();

    // Verde rame/ossidato opaco
    ctx.fillStyle = "#10ac84";
    ctx.strokeStyle = "#01937c";
    ctx.lineWidth = 3;

    ctx.fillRect(x - 4, y - 55, 8, 75); // Palo centrale operativo
    
    ctx.fillStyle = "#ba9400"; // Fulcro opaco
    ctx.beginPath(); ctx.arc(x, y - 51, 6, 0, Math.PI*2); ctx.fill();

    // L'imperfezione della fisica: La barra è inclinata (Sbilanciata dalle passioni umane)
    ctx.translate(x, y - 49);
    ctx.rotate(0.08); // Leggera rotazione realistica, non esagerata

    ctx.fillStyle = "#10ac84";
    ctx.fillRect(-45, 0, 90, 5);

    // Piatti identici all'originale, ma pendono storti a causa dell'inclinazione dell'asse
    ctx.strokeStyle = "#2f3542";
    ctx.lineWidth = 1.5;

    // Piatto Sinistro (Sale leggermente)
    ctx.beginPath(); ctx.moveTo(-40, 4); ctx.lineTo(-55, 29); ctx.lineTo(-25, 29); ctx.closePath(); ctx.stroke();
    ctx.fillStyle = "#ba9400"; ctx.fillRect(-55, 29, 30, 4);

    // Piatto Destro (Scende leggermente)
    ctx.beginPath(); ctx.moveTo(40, 4); ctx.lineTo(25, 29); ctx.lineTo(55, 29); ctx.closePath(); ctx.stroke();
    ctx.fillRect(25, 29, 30, 4);

    ctx.restore();
}
function movePlayer(dx, dy) {
 // 🔥 NUOVO: Se siamo nella schermata di vittoria, il giocatore è congelato
    if (gameState === "platoWin") return;
    // 1. Calcola la posizione dove il giocatore vorrebbe andare
    let nextX = player.x + dx;
    let nextY = player.y + dy;

    // Salva la posizione attuale prima del movimento
    let tentX = player.x;
    let tentY = player.y;

    // (Il resto della tua funzione movePlayer rimane identico...)
    if (keys.ArrowLeft  || keys.a) tentX -= 3;
    if (keys.ArrowRight || keys.d) tentX += 3;
    if (keys.ArrowUp    || keys.w) tentY -= 3;
    if (keys.ArrowDown  || keys.s) tentY += 3;

    let sbatte = false;

    for (let i = 0; i < platoStatues.length; i++) {
        let statua = platoStatues[i];
        if (Math.abs(tentX - statua.x) < 45 && (tentY > statua.y + 5 && tentY < statua.y + 35)) {
            sbatte = true;
            break;
        }
    }

    if (!sbatte) {
        player.x = tentX;
        player.y = tentY;
    }
// ==========================================
// 🚪 PORTA FINALE ROOM 4 (FIX ROBUSTO)
// ==========================================
if (room === 4 && finalKeyTaken) {

    // centro porta
    let doorX = 600;
    let doorY = 20; // in alto

    let dist = Math.hypot(
        (player.x + player.w / 2) - doorX,
        (player.y + player.h / 2) - doorY
    );

    // se sei vicino alla porta → entri
    if (dist < 60) {

        room4Door.open = true;
        gameState = "world";
        for (let key in keys) { keys[key] = false; }
        room = 5;

        player.x = 600;
        player.y = 540;

        return;
    }
}
}
function handleInteraction() {
    // Controlla la vicinanza usando lo STESSO raggio esatto usato per disegnare la scritta UI (statue.interactDist)
    let nearbyStatue = platoStatues.find(statue => Math.hypot(player.x - statue.x, player.y - statue.y) < statue.interactDist);
    
    // Se non trova nessuna statua nel raggio allargato, esce
    if (!nearbyStatue) return; 

    // LOGICA DI RACCOLTA/COLLEGAMENTO CORDA
    if (!interactionState.selectedStatue) {
        // Raccogli corda nel mondo sensibile
        if (nearbyStatue.world === "sensibile" && !interactionState.connections.includes(nearbyStatue.id)) {
            interactionState.selectedStatue = nearbyStatue;
        }
    } else {
        // Rilascia o annulla se premi sulla stessa
        if (nearbyStatue.id === interactionState.selectedStatue.id) {
            interactionState.selectedStatue = null;
            return;
        }

        // Collega se hai preso la statua corretta dell'Iperuranio
        if (nearbyStatue.id === interactionState.selectedStatue.targetId) {
            interactionState.connections.push(interactionState.selectedStatue.id);
            interactionState.selectedStatue = null;
        } else {
            // Se sbagli ad agganciare nell'Iperuranio, la corda si resetta
            interactionState.selectedStatue = null;
        }
    }
}
// Aggancio dell'evento alla tastiera (Es: Tasto "E" o Barra Spaziatrice)
window.addEventListener("keydown", (e) => {
    if (e.key.toLowerCase() === "e" || e.key === " ") {
        handleInteraction();
    }
});

function loop() {
    // 1. GESTIONE SPECIFICA MINIGIOCO PLATONE
    if (gameState === "platoGame") {
        
        // 🔥 MODIFICATO: Usiamo movePlayer(0,0) invece di move() per sbloccare l'omino!
        if (typeof movePlayer === 'function') {
            movePlayer(0, 0); 
        } else if (typeof move === 'function') {
            move(); 
        }
        
        // Muri invisibili AGGRANDITI attorno ai piedistalli
        if (typeof platoStatues !== 'undefined') {
            for (let i = 0; i < platoStatues.length; i++) {
                let statua = platoStatues[i];
                
                // --- DIMENSIONI HITBOX INGRANDITE ---
                let mezzoW = 55; // Più largo (destra/sinistra)
                let mezzoH = 30; // Più spesso (sopra/sotto)
                let centroX = statua.x;
                let centroY = statua.y + 20; 

                if (player.x > centroX - mezzoW && player.x < centroX + mezzoW &&
                    player.y > centroY - mezzoH && player.y < centroY + mezzoH) {
                    
                    let daSinistra = player.x - (centroX - mezzoW);
                    let daDestra   = (centroX + mezzoW) - player.x;
                    let daSopra    = player.y - (centroY - mezzoH);
                    let daSotto    = (centroY + mezzoH) - player.y;
                    let min = Math.min(daSinistra, daDestra, daSopra, daSotto);

                    if (min === daSinistra) player.x = centroX - mezzoW;
                    else if (min === daDestra) player.x = centroX + mezzoW;
                    else if (min === daSopra) player.y = centroY - mezzoH;
                    else if (min === daSotto) player.y = centroY + mezzoH;
                }
            }
        }

        drawPlatoGameScreen();
        requestAnimationFrame(loop);
        return; 
    }

    // ... Tutto il resto del tuo loop rimane identico sotto ...
    updateHeraclitusGame(); 
    move(); 
    checkDialogZone();
    checkKeyCollection();
    updateNearby();

    checkGoldenKeyUnlock();
    draw();

    if (parmenideGame.active) {
        updateParmenideGame();
        drawParmenideGame();
    }

    if (heraclitusGame.flashTimer > 0) {
        heraclitusGame.flashTimer--;
    } else {
        heraclitusGame.flash = null;
    }

    if (goldenKey.active && !goldenKey.collected) {
        ctx.fillStyle = "gold";
        drawKeyShape(goldenKey.x, goldenKey.y, 0);
    }

    if (goldenKey.followPlayer) {
        goldenKey.x = player.x + 10;
        goldenKey.y = player.y - 10;
    }

    requestAnimationFrame(loop);
}
loop();
